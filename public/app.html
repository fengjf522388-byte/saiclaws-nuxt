<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🍅 番茄钟</title>
<style>
  :root {
    --focus: #ef4444;
    --focus-light: #fca5a5;
    --break: #22c55e;
    --break-light: #86efac;
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
    --muted: #94a3b8;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* Background particles */
  .particles {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    animation: float linear infinite;
  }
  @keyframes float {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100px) scale(1); opacity: 0; }
  }

  .container {
    position: relative; z-index: 1;
    width: 100%; max-width: 400px;
    padding: 20px;
  }

  /* Mode Tabs */
  .tabs {
    display: flex;
    background: var(--card);
    border-radius: 16px;
    padding: 4px;
    margin-bottom: 24px;
  }
  .tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    color: var(--muted);
    border: none;
    background: none;
  }
  .tab.active {
    background: var(--focus);
    color: white;
    box-shadow: 0 4px 15px rgba(239,68,68,0.4);
  }
  .tab.active.break-mode {
    background: var(--break);
    box-shadow: 0 4px 15px rgba(34,197,94,0.4);
  }

  /* Timer Circle */
  .timer-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
  }
  .timer-circle {
    position: relative;
    width: 280px; height: 280px;
  }
  .timer-bg {
    fill: none;
    stroke: var(--card);
    stroke-width: 8;
  }
  .timer-progress {
    fill: none;
    stroke: var(--focus);
    stroke-width: 8;
    stroke-linecap: round;
    transform: rotate(-90deg);
    transform-origin: center;
    transition: stroke-dashoffset 1s linear, stroke 0.5s;
  }
  .timer-progress.break-progress {
    stroke: var(--break);
  }
  .timer-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .time-display {
    font-size: 64px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -2px;
    transition: color 0.5s;
  }
  .time-label {
    font-size: 14px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-bottom: 28px;
  }
  .btn {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    transition: all 0.3s;
  }
  .btn-play {
    width: 72px; height: 72px;
    background: var(--focus);
    color: white;
    font-size: 30px;
    box-shadow: 0 6px 25px rgba(239,68,68,0.5);
  }
  .btn-play.break-btn {
    background: var(--break);
    box-shadow: 0 6px 25px rgba(34,197,94,0.5);
  }
  .btn-play:active { transform: scale(0.92); }
  .btn-sm {
    background: var(--card);
    color: var(--text);
  }
  .btn-sm:active { background: #334155; }

  /* Stats */
  .stats {
    display: flex;
    justify-content: space-around;
    background: var(--card);
    border-radius: 16px;
    padding: 16px;
  }
  .stat {
    text-align: center;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 700;
    color: var(--focus);
  }
  .stat-value.break-stat { color: var(--break); }
  .stat-label {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Session Dots */
  .sessions {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 24px;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--card);
    transition: all 0.3s;
  }
  .dot.done { background: var(--focus); width: 28px; border-radius: 5px; }
  .dot.break-done { background: var(--break); width: 28px; border-radius: 5px; }
  .dot.current { background: var(--focus); box-shadow: 0 0 8px var(--focus); }
  .dot.current.break-current { background: var(--break); box-shadow: 0 0 8px var(--break); }

  /* Duration settings */
  .settings {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 20px;
  }
  .setting {
    text-align: center;
  }
  .setting-label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .setting-value {
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .adj {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: none;
    background: var(--card);
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .adj:active { background: #334155; }

  /* Toast */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-120px);
    background: var(--focus);
    color: white;
    padding: 12px 24px;
    border-radius: 25px;
    font-weight: 600;
    font-size: 15px;
    z-index: 100;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 8px 30px rgba(239,68,68,0.5);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.break-toast {
    background: var(--break);
    box-shadow: 0 8px 30px rgba(34,197,94,0.5);
  }

  /* Responsive */
  @media (max-width: 380px) {
    .timer-circle { width: 240px; height: 240px; }
    .time-display { font-size: 52px; }
    .container { padding: 16px; }
  }

  @media (min-width: 768px) {
    .timer-circle { width: 320px; height: 320px; }
    .time-display { font-size: 72px; }
  }
</style>
</head>
<body>

<!-- Particles -->
<div class="particles" id="particles"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<div class="container">
  <!-- Mode Tabs -->
  <div class="tabs">
    <button class="tab active" id="focusTab" onclick="switchMode('focus')">🔴 专注</button>
    <button class="tab" id="breakTab" onclick="switchMode('break')">🟢 休息</button>
  </div>

  <!-- Session Dots -->
  <div class="sessions" id="sessions"></div>

  <!-- Timer -->
  <div class="timer-wrapper">
    <div class="timer-circle">
      <svg viewBox="0 0 200 200" width="100%" height="100%">
        <circle class="timer-bg" cx="100" cy="100" r="92"/>
        <circle class="timer-progress" id="progress" cx="100" cy="100" r="92"
          stroke-dasharray="578" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-text">
        <div class="time-display" id="timeDisplay">25:00</div>
        <div class="time-label" id="timeLabel">准备开始</div>
      </div>
    </div>
  </div>

  <!-- Duration Settings -->
  <div class="settings">
    <div class="setting">
      <div class="setting-label">专注</div>
      <div class="setting-value">
        <button class="adj" onclick="adjDuration('focus', -5)">−</button>
        <span id="focusDur">25</span>
        <button class="adj" onclick="adjDuration('focus', 5)">+</button>
      </div>
    </div>
    <div class="setting">
      <div class="setting-label">休息</div>
      <div class="setting-value">
        <button class="adj" onclick="adjDuration('break', -5)">−</button>
        <span id="breakDur">5</span>
        <button class="adj" onclick="adjDuration('break', 5)">+</button>
      </div>
    </div>
    <div class="setting">
      <div class="setting-label">轮数</div>
      <div class="setting-value">
        <button class="adj" onclick="adjRounds(-1)">−</button>
        <span id="roundsVal">4</span>
        <button class="adj" onclick="adjRounds(1)">+</button>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-sm" onclick="reset()" title="重置">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
    </button>
    <button class="btn btn-play" id="playBtn" onclick="toggle()" title="开始">
      <svg id="playIcon" width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    </button>
    <button class="btn btn-sm" onclick="skip()" title="跳过">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 5 21 12 13 19 13 5"/><polygon points="5 5 13 12 5 19 5 5"/></svg>
    </button>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="completedCount">0</div>
      <div class="stat-label">完成轮数</div>
    </div>
    <div class="stat">
      <div class="stat-value break-stat" id="totalMinutes">0</div>
      <div class="stat-label">总专注(分)</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="streakCount">0</div>
      <div class="stat-label">连续天数</div>
    </div>
  </div>
</div>

<script>
// ===== State =====
const CIRCUMFERENCE = 2 * Math.PI * 92; // ~578
let mode = 'focus'; // 'focus' | 'break'
let focusDuration = 25;
let breakDuration = 5;
let totalRounds = 4;
let currentRound = 1;
let timeLeft = focusDuration * 60;
let totalTime = focusDuration * 60;
let timer = null;
let isRunning = false;
let completedSessions = parseInt(localStorage.getItem('pomo_sessions') || 0);
let totalFocusMin = parseInt(localStorage.getItem('pomo_minutes') || 0);
let streak = parseInt(localStorage.getItem('pomo_streak') || 0);
let lastDate = localStorage.getItem('pomo_lastDate') || '';

// ===== Init =====
document.getElementById('progress').style.strokeDasharray = CIRCUMFERENCE;
updateDisplay();
updateStats();
updateSessions();
createParticles();

// Check streak
const today = new Date().toDateString();
if (lastDate !== today) {
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (lastDate === yesterday) {
    streak++;
  } else if (lastDate !== '') {
    streak = 0;
  }
  localStorage.setItem('pomo_streak', streak);
  localStorage.setItem('pomo_lastDate', today);
}
updateStats();

// ===== Core Functions =====
function toggle() {
  if (isRunning) {
    pause();
  } else {
    start();
  }
}

function start() {
  if (timer) return;
  isRunning = true;
  updatePlayButton();
  document.getElementById('timeLabel').textContent = mode === 'focus' ? '🔴 专注中' : '🟢 休息中';
  
  timer = setInterval(() => {
    timeLeft--;
    updateDisplay();
    
    if (timeLeft <= 0) {
      clearInterval(timer);
      timer = null;
      onComplete();
    }
  }, 1000);
}

function pause() {
  clearInterval(timer);
  timer = null;
  isRunning = false;
  updatePlayButton();
  document.getElementById('timeLabel').textContent = '已暂停';
}

function reset() {
  clearInterval(timer);
  timer = null;
  isRunning = false;
  currentRound = 1;
  switchModeUI('focus');
  timeLeft = focusDuration * 60;
  totalTime = focusDuration * 60;
  updatePlayButton();
  updateDisplay();
  updateSessions();
  document.getElementById('timeLabel').textContent = '准备开始';
}

function skip() {
  clearInterval(timer);
  timer = null;
  timeLeft = 0;
  updateDisplay();
  onComplete();
}

function onComplete() {
  isRunning = false;
  
  if (mode === 'focus') {
    // Focus session done
    completedSessions++;
    totalFocusMin += focusDuration;
    localStorage.setItem('pomo_sessions', completedSessions);
    localStorage.setItem('pomo_minutes', totalFocusMin);
    localStorage.setItem('pomo_streak', streak);
    localStorage.setItem('pomo_lastDate', new Date().toDateString());
    updateStats();
    updateSessions();
    
    // Vibrate if supported
    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    
    if (currentRound < totalRounds) {
      // Switch to break
      showToast('✅ 专注完成！休息一下吧~', false);
      switchModeUI('break');
      timeLeft = breakDuration * 60;
      totalTime = breakDuration * 60;
      document.getElementById('timeLabel').textContent = '🟢 休息中';
    } else {
      // All rounds done
      showToast('🎉 全部完成！太棒了！', false);
      switchModeUI('focus');
      currentRound = 1;
      timeLeft = focusDuration * 60;
      totalTime = focusDuration * 60;
      document.getElementById('timeLabel').textContent = '全部完成！';
      updateSessions();
      return;
    }
  } else {
    // Break done
    currentRound++;
    showToast('🔔 休息结束，继续加油！', true);
    switchModeUI('focus');
    timeLeft = focusDuration * 60;
    totalTime = focusDuration * 60;
    document.getElementById('timeLabel').textContent = '🔴 专注中';
  }
  
  updateDisplay();
  updatePlayButton();
  updateSessions();
  
  // Auto-start next session
  start();
}

function switchMode(m) {
  if (isRunning) pause();
  switchModeUI(m);
  if (m === 'focus') {
    timeLeft = focusDuration * 60;
    totalTime = focusDuration * 60;
  } else {
    currentRound = 1;
    timeLeft = breakDuration * 60;
    totalTime = breakDuration * 60;
  }
  updateDisplay();
  updateSessions();
  document.getElementById('timeLabel').textContent = '准备开始';
}

function switchModeUI(m) {
  mode = m;
  const ft = document.getElementById('focusTab');
  const bt = document.getElementById('breakTab');
  const prog = document.getElementById('progress');
  const pb = document.getElementById('playBtn');
  
  if (m === 'focus') {
    ft.classList.add('active');
    ft.classList.remove('break-mode');
    bt.classList.remove('active');
    bt.classList.remove('break-mode');
    prog.classList.remove('break-progress');
    pb.classList.remove('break-btn');
  } else {
    bt.classList.add('active', 'break-mode');
    ft.classList.remove('active');
    prog.classList.add('break-progress');
    pb.classList.add('break-btn');
  }
}

function updateDisplay() {
  const min = Math.floor(timeLeft / 60);
  const sec = timeLeft % 60;
  document.getElementById('timeDisplay').textContent = 
    String(min).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
  
  // Update progress ring
  const progress = 1 - (timeLeft / totalTime);
  const offset = CIRCUMFERENCE * (1 - progress);
  document.getElementById('progress').style.strokeDashoffset = offset;
}

function updatePlayButton() {
  const icon = document.getElementById('playIcon');
  if (isRunning) {
    icon.innerHTML = '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>';
  } else {
    icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
  }
}

function updateSessions() {
  const container = document.getElementById('sessions');
  if (mode === 'break') {
    container.innerHTML = '';
    return;
  }
  let html = '';
  for (let i = 1; i <= totalRounds; i++) {
    let cls = 'dot';
    if (i < currentRound) cls += ' done';
    else if (i === currentRound && mode === 'focus') cls += ' current';
    html += `<div class="${cls}"></div>`;
  }
  container.innerHTML = html;
}

function updateStats() {
  document.getElementById('completedCount').textContent = completedSessions;
  document.getElementById('totalMinutes').textContent = totalFocusMin;
  document.getElementById('streakCount').textContent = streak;
}

function adjDuration(type, delta) {
  if (type === 'focus') {
    focusDuration = Math.max(5, Math.min(60, focusDuration + delta));
    document.getElementById('focusDur').textContent = focusDuration;
    if (mode === 'focus' && !isRunning) {
      timeLeft = focusDuration * 60;
      totalTime = focusDuration * 60;
      updateDisplay();
    }
  } else {
    breakDuration = Math.max(1, Math.min(30, breakDuration + delta));
    document.getElementById('breakDur').textContent = breakDuration;
    if (mode === 'break' && !isRunning) {
      timeLeft = breakDuration * 60;
      totalTime = breakDuration * 60;
      updateDisplay();
    }
  }
}

function adjRounds(delta) {
  totalRounds = Math.max(1, Math.min(10, totalRounds + delta));
  document.getElementById('roundsVal').textContent = totalRounds;
  if (currentRound > totalRounds) currentRound = totalRounds;
  updateSessions();
}

function showToast(msg, isBreak) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.remove('break-toast');
  if (isBreak) toast.classList.add('break-toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ===== Particles =====
function createParticles() {
  const container = document.getElementById('particles');
  const colors = mode === 'focus' 
    ? ['rgba(239,68,68,0.15)', 'rgba(252,165,165,0.1)']
    : ['rgba(34,197,94,0.15)', 'rgba(134,239,172,0.1)'];
  
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.width = p.style.height = (Math.random() * 6 + 2) + 'px';
    p.style.background = colors[Math.floor(Math.random() * 2)];
    p.style.animationDuration = (Math.random() * 10 + 8) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    container.appendChild(p);
  }
}

// Wake lock
if ('wakeLock' in navigator) {
  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible' && isRunning) {
      try { await navigator.wakeLock.request('screen'); } catch(e) {}
    }
  });
}
</script>
</body>
</html>
